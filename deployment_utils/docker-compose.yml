name: bands

services:
  db:
    container_name: db
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DATABASE_NAME}
      - DATABASE_APP_USERNAME=${DATABASE_APP_USERNAME}
      - DATABASE_APP_USER_PASSWORD=${DATABASE_APP_USER_PASSWORD}
    ports:
      - ${DATABASE_PORT}:3306
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    env_file:
      - .env
  backend:
    container_name: backend
    user: "appuser"
    image: riccardocmp/bands-backend:latest
    ports:
      - ${BACKEND_APP_PORT}:8000
    depends_on:
      - db
    environment:
      APP_ENVIRONMENT: "PRODUCTION"
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG}
      DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_APP_USERNAME: ${DATABASE_APP_USERNAME}
      DATABASE_APP_USER_PASSWORD: ${DATABASE_APP_USER_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DJANGO_CORS_ALLOWED_ORIGINS_REGEX: ${DJANGO_CORS_ALLOWED_ORIGINS_REGEX}
      USE_SSL: ${USE_SSL}
    env_file:
      - .env
    entrypoint: ["./entrypoint.sh"]
    volumes:
      - ./certificate.pem:/app/certificate.pem
      - ./privatekey.pem:/app/privatekey.pem
volumes:
  db_data: