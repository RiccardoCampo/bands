name: Backend

run-name: ${{ github.event.pull_request.title || github.ref_name }}
on:
  pull_request:
    branches-ignore: [main]
    paths:
      - bands_backend/**
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-style-checks:
    name: Style checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Cache dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: |
          bands_backend/.cache
          bands_backend/.venv
        key: uv-${{ hashFiles('**/uv.lock') }}

    - name: Run checks
      run: |
        cd bands_backend
        python --version && uv --version
        uv run make style

  python-tests:
    name: Style checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Cache dependencies
      id: cache-dependencies
      uses: actions/cache@v4
      with:
        path: |
          bands_backend/.cache
          bands_backend/.venv
        key: uv-${{ hashFiles('**/uv.lock') }}

    - name: Run checks
      run: |
        cd bands_backend
        python --version && uv --version
        uv run make test